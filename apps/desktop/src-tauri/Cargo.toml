[package]
name = "sparkle"
version = "0.1.0"
edition = "2021"
description = "Sparkle desktop (macOS)"

[lib]
name = "sparkle_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.8"
base64 = "0.22"
sherpa-onnx = "1.13.3"
cpal = "0.15"
ureq = "2"
bzip2 = "0.4"
tar = "0.4"
tauri-plugin-global-shortcut = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

[dev-dependencies]
hound = "3.5"
tempfile = "3"
