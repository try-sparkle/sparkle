[package]
name = "sparkle"
version = "0.1.0"
edition = "2021"
description = "Sparkle desktop (macOS)"

[lib]
name = "sparkle_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.8"
